<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - KI-Lerncoach</title>
    <link rel="stylesheet" href="styles.css">
    <script src="translations.js"></script>
    <style>
        /* Override phone-frame for iframe embedding */
        .phone-frame {
            max-width: 100%;
            margin: 0;
            border-radius: 0;
            box-shadow: none;
            height: 100%;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <!-- User Toggle Buttons -->
    <div class="user-toggle">
        <a href="index.html" class="user-toggle-btn active">Betreuer</a>
        <a href="admin.html" class="user-toggle-btn">Admin</a>
    </div>

    <div class="phone-frame">
        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 data-translate="menu">Menu</h2>
                <button class="sidebar-close" id="sidebar-close">x</button>
            </div>
            <div class="sidebar-content">
                <ul class="sidebar-menu">
                    <li>
                        <a href="#" onclick="alert('Hilfe-Seite ist in diesem Prototyp nicht verfugbar.'); return false;">
                            <img src="icons/help-72.png" alt="Help">
                            <span data-translate="help">Hilfe</span>
                        </a>
                    </li>
                    <li>
                        <a href="index.html" class="logout-link">
                            <img src="icons/logout-72.png" alt="Logout" style="filter: brightness(0) saturate(100%) invert(27%) sepia(94%) saturate(2613%) hue-rotate(343deg) brightness(89%) contrast(90%);">
                            <span data-translate="logout">Abmelden</span>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="sidebar-footer">
                <div class="sidebar-user-info">
                    <div class="sidebar-user-label">Angemeldet als</div>
                    <div class="sidebar-user-email">maria.muster@example.ch</div>
                </div>
            </div>
        </div>
        <div class="header">
            <span class="menu-icon" id="menu-icon" style="cursor: pointer;"><img src="icons/menu-72.png" alt="Menu" class="icon-white" style="vertical-align: middle;"></span>
            <h1>KI-Lerncoach</h1>
            <span class="lang-selector"><img src="icons/language-72.png" alt="Language" class="icon-white" style="vertical-align: middle;"> DE</span>
        </div>
        <div class="content">
            <div class="welcome">
                <h2 data-translate="greeting">Willkommen!</h2>
                <p data-translate="how_can_help">Wie kann ich dir heute helfen?</p>
            </div>

            <a href="assessment.html" class="card" style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;">
                <img src="icons/assessment-96.png" alt="Target" class="card-icon-img">
                <div class="card-title" data-translate="assess_competencies">Kompetenzen einschatzen</div>
            </a>

            <a href="learning-path.html" class="card" style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;">
                <img src="icons/books-96.png" alt="Books" class="card-icon-img">
                <div class="card-title" data-translate="develop_competencies">Kompetenzen entwickeln</div>
            </a>

            <a href="reflexion_chat.html" class="card" style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;">
                <img src="icons/chat-96.png" alt="Chat" class="card-icon-img">
                <div class="card-title" data-translate="reflect_experiences">Erfahrungen reflektieren</div>
            </a>

            <a href="competencies.html" class="card" style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;">
                <img src="icons/certificate-96.png" alt="Certificate" class="card-icon-img">
                <div class="card-title" data-translate="my_competencies">Meine Kompetenzen</div>
            </a>
        </div>
    </div>

    <script>
        // Sidebar functionality
        const menuIcon = document.getElementById('menu-icon');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const sidebarClose = document.getElementById('sidebar-close');

        function openSidebar() {
            sidebar.classList.add('active');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
        }

        menuIcon.addEventListener('click', openSidebar);
        sidebarClose.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
